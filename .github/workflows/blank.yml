name: Build APK from ZIP URL

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: تثبيت الأدوات
        run: sudo apt-get update && sudo apt-get install -y unzip wget

      - name: تحميل ملف ZIP
        run: wget -O project.zip "https://files.catbox.moe/tod4p7.zip"

      - name: فك الضغط
        run: unzip -o project.zip

      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: إنشاء أيقونات افتراضية إذا كانت مفقودة
        run: |
          DIR=$(find . -type f -name "gradlew" | head -n 1 | xargs dirname)
          RES_DIR="$DIR/app/src/main/res"
          wget -q "https://placehold.co/192x192.png" -O /tmp/icon.png
          for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$RES_DIR/$density"
            cp /tmp/icon.png "$RES_DIR/$density/ic_launcher.png"
            cp /tmp/icon.png "$RES_DIR/$density/ic_launcher_round.png"
          done

      - name: بناء المشروع
        run: |
          DIR=$(find . -type f -name "gradlew" | head -n 1 | xargs dirname)
          echo "Project at: $DIR"
          cd "$DIR"
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
