name: Build APK from ZIP

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: سحب المشروع
        uses: actions/checkout@v4

      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: فك الضغط
        run: unzip -o flaxon-bot.zip

      - name: عرض الملفات
        run: ls -R

      - name: تحميل Gradle حديث
        run: |
          wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip gradle-8.5-bin.zip
          export GRADLE_HOME=$PWD/gradle-8.5
          export PATH=$GRADLE_HOME/bin:$PATH
          gradle -v

      - name: بناء المشروع
        run: |
          export GRADLE_HOME=$PWD/gradle-8.5
          export PATH=$GRADLE_HOME/bin:$PATH

          DIR=$(find . -type f -name "settings.gradle" | head -n 1 | xargs dirname)
          echo "Project found at: $DIR"

          cd "$DIR"

          # إذا gradlew غير موجود، ننشئه باستخدام Gradle الحديث
          if [ ! -f "gradlew" ]; then
            echo "Generating gradlew with Gradle 8.5..."
            gradle wrapper --gradle-version 8.5
          fi

          chmod +x gradlew

          ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/**/*.apk"
