name: Build APK from ZIP URL

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: تثبيت الأدوات
        run: sudo apt-get update && sudo apt-get install -y unzip wget

      - name: تحميل ملف ZIP
        run: wget -O project.zip "https://files.catbox.moe/tod4p7.zip"

      - name: فك الضغط
        run: unzip -o project.zip

      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: بناء المشروع
        run: |
          DIR=$(find . -type f -name "gradlew" | head -n 1 | xargs dirname)
          echo "Project at: $DIR"

          cd "$DIR"

          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
