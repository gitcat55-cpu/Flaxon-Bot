name: Build APK from ZIP URL

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: تثبيت الأدوات
        run: sudo apt-get update && sudo apt-get install -y unzip wget

      - name: تحميل ملف ZIP
        run: wget -O project.zip "https://files.catbox.moe/tod4p7.zip"

      - name: فك الضغط
        run: unzip -o project.zip

      - name: تثبيت Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: إنشاء أيقونات افتراضية إذا كانت مفقودة
        run: |
          DIR=$(find . -type f -name "gradlew" | head -n 1 | xargs dirname)
          RES_DIR="$DIR/app/src/main/res"

          for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$RES_DIR/$density"
            for icon in ic_launcher ic_launcher_round; do
              if [ ! -f "$RES_DIR/$density/${icon}.png" ]; then
                # إنشاء صورة PNG بسيطة بحجم 48x48
                python3 -c "
import struct, zlib, base64

def create_png(size):
    def chunk(name, data):
        c = zlib.crc32(name + data) & 0xffffffff
        return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
    
    raw = b''
    for y in range(size):
        raw += b'\x00'
        for x in range(size):
            r = 100 if (x//4 + y//4) % 2 == 0 else 60
            raw += bytes([r, 120, 200, 255])
    
    compressed = zlib.compress(raw)
    ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
    
    return (b'\x89PNG\r\n\x1a\n' +
            chunk(b'IHDR', ihdr) +
            chunk(b'IDAT', compressed) +
            chunk(b'IEND', b''))

with open('icon.png', 'wb') as f:
    f.write(create_png(48))
"
                cp icon.png "$RES_DIR/$density/${icon}.png"
              fi
            done
          done

      - name: بناء المشروع
        run: |
          DIR=$(find . -type f -name "gradlew" | head -n 1 | xargs dirname)
          echo "Project at: $DIR"
          cd "$DIR"
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
